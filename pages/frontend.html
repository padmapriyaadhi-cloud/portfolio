<div class="page-container">
    <section class="fade-in-up">
        <h2 class="section-title">Frontend Engineering</h2>

        <div class="exp-grid" style="grid-template-columns: repeat(2, 1fr);">
            
            <div class="exp-box glass static-card" style="display: flex; flex-direction: column;">
                <div style="margin-bottom: 1.5rem;">
                    <span style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--primary); background: rgba(139,92,246,0.1); padding: 0.4rem 0.8rem; border-radius: 6px;">HTML / CSS / JS</span>
                </div>
                <h3 style="font-size: 1.6rem; margin-bottom: 1rem; color: #fff;">Custom Web Interface</h3>
                <div style="flex: 1;"></div>
                <div style="margin-top: 2rem;">
                    <button style="background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: var(--transition-smooth);" onmouseover="this.style.background='var(--primary)'; this.style.color='#fff'" onmouseout="this.style.background='transparent'; this.style.color='var(--primary)'">
                        View Demo ->
                    </button>
                </div>
            </div>

            <div class="exp-box glass static-card" style="display: flex; flex-direction: column;">
                <div style="margin-bottom: 1.5rem;">
                    <span style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--secondary); background: rgba(59,130,246,0.1); padding: 0.4rem 0.8rem; border-radius: 6px;">Power BI / Visualization</span>
                </div>
                <h3 style="font-size: 1.6rem; margin-bottom: 1rem; color: #fff;">Data Insights Dashboard</h3>
                <div style="flex: 1;"></div>
                <div style="margin-top: 2rem;">
                    <button style="background: transparent; border: 1px solid var(--secondary); color: var(--secondary); padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: var(--transition-smooth);" onmouseover="this.style.background='var(--secondary)'; this.style.color='#fff'" onmouseout="this.style.background='transparent'; this.style.color='var(--secondary)'">
                        View Dashboard ->
                    </button>
                </div>
            </div>

        </div>
    </section>
</div>
